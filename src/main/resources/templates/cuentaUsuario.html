<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments :: head (titulo='My Account')"></head>

<body>
<div th:replace="fragments :: userNavbar(${usuarioId}, ${usuarioNombre})"></div>

<div class="container-fluid">
  <div class="row mt-3">
    <div class="col">
      <h2>My Account</h2>
    </div>
  </div>

  <div class="row mt-3">
    <div class="col-md-6">
      <div class="card">
        <div class="card-header">
          <h4>Profile</h4>
        </div>
        <div class="card-body">
          <p><strong>Name:</strong> <span th:text="${usuario.nombre}"></span></p>
          <p><strong>Email:</strong> <span th:text="${usuario.email}"></span></p>
          <p><strong>Birth Date:</strong> <span th:text="${#dates.format(usuario.fechaNacimiento, 'dd-MM-yyyy')}"></span></p>
          <p><strong>Admin:</strong> <span th:text="${usuario.isAdmin != null and usuario.isAdmin ? 'Yes' : 'No'}"></span></p>
        </div>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card">
        <div class="card-header">
          <h4>My Teams</h4>
        </div>
        <div class="card-body">
          <div class="alert alert-success" th:if="${mensaje != null}" th:text="${mensaje}"></div>
          <div class="alert alert-danger" th:if="${error != null}" th:text="${error}"></div>

          <ul class="list-group">
            <li class="list-group-item" th:each="equipo : ${equipos}">
              <div class="d-flex justify-content-between align-items-center">
                <span>
                  <a th:href="@{/equipos/{id}(id=${equipo.id})}" th:text="${equipo.nombre}"></a>
                </span>
                <form method="post" th:action="@{/equipos/{id}/leave(id=${equipo.id})}" class="d-inline">
                  <button type="submit" class="btn btn-danger btn-sm">Leave</button>
                </form>
              </div>
            </li>
          </ul>

          <div th:if="${#lists.isEmpty(equipos)}" class="alert alert-info">
            You are not a member of any teams yet.
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div th:replace="fragments::javascript"></div>
</body>
</html>
