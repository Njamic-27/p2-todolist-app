<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments :: head (titulo='Teams')"></head>

<body>
<div th:replace="fragments :: userNavbar(${usuarioId}, ${usuarioNombre})"></div>

<div class="container-fluid">
  <div class="row mt-3">
    <div class="col">
      <h2>Teams</h2>
      <a class="btn btn-primary btn-sm" th:href="@{/equipos/nuevo}">New Team</a>
    </div>
  </div>

  <div class="row mt-3">
    <div class="col">
      <table class="table table-striped">
        <thead>
        <tr>
          <th>Id</th>
          <th>Name</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="equipo : ${equipos}">
          <td th:text="${equipo.id}"></td>
          <td>
            <a th:href="@{/equipos/{id}(id=${equipo.id})}" th:text="${equipo.nombre}"></a>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div th:replace="fragments::javascript"></div>
</body>
</html>
